<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rekomendasi & Tindak Lanjut – BEN SCN Manggarai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#060b18;--sur:#0a1020;--card:#0e1628;--card2:#121e32;
  --bdr:#1a2a44;--bdr2:#243654;
  --acc:#4f8ef7;--grn:#22c55e;--amb:#f59e0b;--red:#ef4444;
  --pur:#a78bfa;--cyn:#06b6d4;--orn:#f97316;
  --txt:#e8f0ff;--mut:#5a7096;--mut2:#7a90b0;--faint:#111e38;--rnd:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:14px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* ── TOPBAR ── */
.topbar{height:52px;flex-shrink:0;background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;align-items:center;gap:12px}
.tb-title{font-size:15px;font-weight:800;color:var(--txt)}
.tb-sub{font-size:11px;color:var(--mut2);margin-top:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--amb)}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;background:var(--faint);border:1px solid var(--bdr);color:var(--mut2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.back-btn:hover{color:var(--txt);border-color:var(--bdr2);background:var(--card2)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px 20px}
.view{display:none}.view.act{display:block}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rnd);padding:12px 15px;position:relative;overflow:hidden;cursor:pointer;transition:all .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.kpi.active{border-width:2px}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kc,var(--acc))}
.kpi .v{font-size:26px;font-weight:800;line-height:1;color:var(--kc,var(--acc))}
.kpi .l{font-size:10px;color:var(--mut);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:8px 12px 8px 34px;font-size:12px;outline:none;font-family:inherit;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--amb)}
.search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:13px;pointer-events:none}
.fsel{background:var(--card);border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:7px 10px;font-size:12px;outline:none;cursor:pointer;font-family:inherit}
.fsel:focus{border-color:var(--amb)}
.filter-count{font-size:11px;font-weight:700;color:var(--mut2);padding:4px 10px;background:var(--card2);border-radius:6px;border:1px solid var(--bdr)}
.view-toggle{display:flex;gap:2px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:3px;flex-shrink:0}
.vt-btn{width:30px;height:28px;border:none;background:transparent;color:var(--mut);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.vt-btn.act{background:var(--acc);color:#fff}

/* ── LIST ANAK ── */
.reco-list{display:flex;flex-direction:column;gap:8px}
.reco-item{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:13px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.reco-item:hover{border-color:var(--bdr2);background:var(--card2)}
.reco-item .ri-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.reco-item .ri-body{flex:1;min-width:0}
.reco-item .ri-name{font-size:13px;font-weight:700;color:var(--txt)}
.reco-item .ri-sub{font-size:11px;color:var(--mut2);margin-top:1px}
.reco-item .ri-priority{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.pr-tinggi{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.pr-sedang{background:rgba(245,158,11,.12);color:var(--amb);border:1px solid rgba(245,158,11,.3)}
.pr-rendah{background:rgba(34,197,94,.12);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.ri-arrow{color:var(--mut);font-size:13px;flex-shrink:0}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:12px;color:var(--mut);text-align:center}
.empty .ico{font-size:44px;opacity:.3}
.empty h2{font-size:17px;font-weight:700;color:var(--txt)}
.empty p{font-size:13px;line-height:1.7;max-width:360px}


/* ── Pihak Kategori Chips ── */
.pihak-kat-wrap{margin-top:8px}
.pihak-kat-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.pihak-kat-label{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:1px}
.pihak-chips{display:flex;flex-wrap:wrap;gap:4px}
.pihak-chip{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:8px;border:1px solid transparent}
/* AI Rekomendasi Box */
.ai-reko-box{margin-top:10px;background:linear-gradient(135deg,rgba(6,182,212,.06),rgba(79,142,247,.04));border:1px solid rgba(6,182,212,.2);border-radius:8px;padding:10px 13px;position:relative;overflow:hidden}
.ai-reko-box::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,#06b6d4,#4f8ef7)}
.ai-reko-label{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#06b6d4;margin-bottom:5px}
.ai-reko-text{font-size:11px;line-height:1.7;color:var(--txt)}
.ai-reko-loading{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--mut)}
.ai-dot{width:4px;height:4px;border-radius:50%;background:#06b6d4;animation:aidot 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes aidot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── DETAIL PANEL ── */
.detail-hdr{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(239,68,68,.05));border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:22px;margin-bottom:16px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.d-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0}
.d-name{font-size:20px;font-weight:900;letter-spacing:-.4px;margin-bottom:3px}
.d-cbr{font-size:12px;color:var(--mut2);margin-bottom:10px}
.d-meta{display:flex;flex-wrap:wrap;gap:6px}
.dm{font-size:11px;color:var(--mut2);background:rgba(255,255,255,.04);border:1px solid var(--bdr);padding:3px 9px;border-radius:99px}
.dm span{color:var(--txt);font-weight:700}
.d-priority-box{margin-left:auto;text-align:center;border-radius:10px;padding:12px 18px;flex-shrink:0;min-width:110px}
.dp-val{font-size:15px;font-weight:900;line-height:1.2}
.dp-lbl{font-size:9px;color:var(--mut2);margin-top:4px;text-transform:uppercase;letter-spacing:.6px}

/* 3 Masalah Utama */
.masalah-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rnd);padding:16px;margin-bottom:14px}
.masalah-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.masalah-hd .dot{width:6px;height:6px;border-radius:50%;background:var(--amb)}
.masalah-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--faint)}
.masalah-item:last-child{border-bottom:none;padding-bottom:0}
.masalah-num{width:26px;height:26px;border-radius:50%;background:rgba(245,158,11,.12);color:var(--amb);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.masalah-body{flex:1}
.masalah-text{font-size:13px;color:var(--txt);line-height:1.7;margin-bottom:8px}
.masalah-pihak{display:flex;flex-wrap:wrap;gap:5px}
.pihak-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:rgba(79,142,247,.1);color:var(--acc);border:1px solid rgba(79,142,247,.25)}


/* Panel anak kiri (mirip dashboard_anak) */
.panel-wrap{display:flex;flex:1;overflow:hidden}
.nama-panel{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;display:none;flex-direction:column}
.nama-panel.open{display:flex}
.np-header{padding:12px 14px 8px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--bdr);flex-shrink:0}
.np-search{padding:8px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.np-search input{width:100%;background:var(--faint);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:5px 9px;font-size:11px;outline:none;font-family:inherit}
.np-search input:focus{border-color:var(--amb)}
.np-list{flex:1;overflow-y:auto;padding:4px 0}
.np-item{padding:8px 14px;cursor:pointer;transition:background .12s;font-size:12px;font-weight:600;color:var(--mut2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;border-left:3px solid transparent}
.np-item:hover{background:var(--faint);color:var(--txt)}
.np-item.act{background:rgba(245,158,11,.1);color:var(--amb);border-left-color:var(--amb)}
.np-pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.np-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.main-content{flex:1;overflow-y:auto;padding:16px 20px}

.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:14px;color:var(--mut)}
.spin{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--amb);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Detail Mode Layout ── */
#cbr-detail-mode { flex: 1; overflow-y: auto; background: var(--bg); }
#cbr-detail-content { padding: 16px; max-width: 860px; margin: 0 auto; }
#cbr-list-mode { flex: 1; overflow-y: auto; }
#view-cbr { display: flex; flex-direction: column; height: 100%; }
#view-cbr.with-detail { flex-direction: row; }

/* Detail Header */
.detail-header { display: flex; align-items: flex-start; gap: 14px; background: var(--card); border: 1px solid var(--bdr); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.detail-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg,#4f8ef7,#06b6d4); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0; }
.detail-info { flex: 1; min-width: 0; }
.detail-nama { font-size: 18px; font-weight: 800; color: var(--txt); margin-bottom: 2px; }
.detail-sub { font-size: 11px; color: var(--mut); font-weight: 600; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }

/* Chip */
.chip { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; background: rgba(255,255,255,.06); border: 1px solid var(--bdr); color: var(--mut2); }

/* Kategori Blocks */
.kat-block { margin-bottom: 14px; border-radius: 10px; overflow: hidden; border: 1px solid var(--bdr); }
.kat-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 11px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; }
.kat-body { padding: 12px 14px; background: var(--card); }
.kat-label { font-size: 10px; font-weight: 700; color: var(--mut); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; margin-top: 8px; }
.kat-label:first-child { margin-top: 0; }
.kat-temuan { font-size: 12.5px; color: var(--txt); line-height: 1.6; margin-bottom: 2px; }
.kat-rtl { font-size: 12px; color: var(--txt); line-height: 1.6; background: rgba(255,255,255,.03); border-left: 3px solid; padding: 8px 10px; border-radius: 0 6px 6px 0; margin-bottom: 2px; }
.kat-loading { display: flex; align-items: center; gap: 6px; padding: 24px 14px; font-size: 12px; color: var(--mut); }

.kat-kesehatan .kat-header { background: rgba(239,68,68,.12); color: #ef4444; }
.kat-kesehatan .kat-rtl { border-color: #ef4444; }
.kat-sosial .kat-header { background: rgba(59,130,246,.12); color: #3b82f6; }
.kat-sosial .kat-rtl { border-color: #3b82f6; }
.kat-ekonomi .kat-header { background: rgba(234,179,8,.12); color: #eab308; }
.kat-ekonomi .kat-rtl { border-color: #eab308; }


.kat-pendidikan .kat-header { background: rgba(59,130,246,.12); color: #3b82f6; }
.kat-pendidikan .kat-rtl { border-color: #3b82f6; }
.kat-penghidupan .kat-header { background: rgba(245,158,11,.12); color: #f59e0b; }
.kat-penghidupan .kat-rtl { border-color: #f59e0b; }
.kat-pemberdayaan .kat-header { background: rgba(16,185,129,.12); color: #10b981; }
.kat-pemberdayaan .kat-rtl { border-color: #10b981; }

</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="tb-title">BEN SCN Manggarai</div>
    <div class="tb-sub">Rekomendasi</div>
  </div>
  <div class="tb-right">
    <button class="back-btn" onclick="fetchAllData()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4"/></svg></button>
    <button class="back-btn" onclick="exportAllExcel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M4 19V5M4 19h16M8 19v-6M12 19v-9M16 19v-4"/></svg></button>
    <button class="back-btn" onclick="exportAllPDF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></button>
    <div class="tb-badge" id="tbBadge">0 anak</div>
  </div>
</div>

<!-- CONTENT -->
<div class="panel-wrap">

  <!-- PANEL NAMA (kiri, muncul saat detail anak dibuka) -->
  <div class="nama-panel" id="namaPanel">
    <div class="np-header">Daftar Anak</div>
    <div class="np-search"><input id="npSearch" type="text" placeholder="Cari nama..." oninput="filterNamaPanel()"></div>
    <div class="np-search" style="padding-top:0">
      <select class="fsel" id="npFilterCBR" onchange="filterNamaPanel()" style="width:100%;font-size:11px;padding:5px 9px">
        <option value="">Semua CBR Worker</option>
      </select>
    </div>
    <div class="np-list" id="npList"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">

    <!-- VIEW: CBR (list + detail) -->
    <div class="view act" id="view-cbr">

      <!-- LIST MODE -->
      <div id="cbr-list-mode">
        <div class="kpi-row" id="kpiRow"></div>

        <div class="toolbar">
          <div class="search-wrap">
            <span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
            <input id="searchInput" type="text" placeholder="Cari nama anak, CBR Worker..." oninput="filterReko()">
          </div>
          <select class="fsel" id="filterCBR" onchange="filterReko()"><option value="">Semua CBR Worker</option></select>
          <select class="fsel" id="filterRagam" onchange="filterReko()"><option value="">Semua Ragam</option></select>
          <select class="fsel" id="filterPriority" onchange="filterReko()">
            <option value="">Semua Prioritas</option>
            <option value="tinggi">● Prioritas Tinggi</option>
            <option value="sedang">● Prioritas Sedang</option>
            <option value="rendah">● Prioritas Rendah</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:11px;color:var(--mut2)">Menampilkan:</span>
          <span class="filter-count" id="filterCount">0 anak</span>
          <div class="view-toggle" style="margin-left:auto">
            <button class="vt-btn act" id="vt-reko-large" onclick="setRekoView('large')" title="Kartu Besar">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
            </button>
            <button class="vt-btn" id="vt-reko-small" onclick="setRekoView('small')" title="Kartu Kecil">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="3" height="3" rx="0.5"/><rect x="6" y="1" width="3" height="3" rx="0.5"/><rect x="11" y="1" width="3" height="3" rx="0.5"/><rect x="1" y="6" width="3" height="3" rx="0.5"/><rect x="6" y="6" width="3" height="3" rx="0.5"/><rect x="11" y="6" width="3" height="3" rx="0.5"/><rect x="1" y="11" width="3" height="3" rx="0.5"/><rect x="6" y="11" width="3" height="3" rx="0.5"/><rect x="11" y="11" width="3" height="3" rx="0.5"/></svg>
            </button>
            <button class="vt-btn" id="vt-reko-list" onclick="setRekoView('list')" title="List">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
            </button>
            <button class="vt-btn" id="vt-reko-detail" onclick="setRekoView('detail')" title="Detail">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="2" height="2" rx="0.5"/><rect x="5" y="2" width="10" height="2" rx="1"/><rect x="1" y="7" width="2" height="2" rx="0.5"/><rect x="5" y="7" width="10" height="2" rx="1"/><rect x="1" y="12" width="2" height="2" rx="0.5"/><rect x="5" y="12" width="10" height="2" rx="1"/></svg>
            </button>
          </div>
        </div>

        <div id="recoGridLarge" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:12px"></div>
        <div id="recoGridSmall" style="display:none;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:12px"></div>
        <div class="reco-list" id="recoList" style="display:none"></div>
        <div id="recoDetailView" style="display:none;margin-bottom:12px"></div>

function renderPihakChips(pihakList) {
  if (!pihakList || !pihakList.length) return '';

  const byKat = {};
  pihakList.forEach(key => {
    const kat = getAktorKategori(key);
    if (!byKat[kat]) byKat[kat] = [];
    byKat[kat].push(key);
  });
  const rows = Object.entries(byKat).map(([kat, keys]) => {
    const colInfo = AKTOR_KAT_COLORS[kat] || {color:'#7a8faf', bg:'rgba(122,143,175,.1)'};
    const chips = keys.map(k => {
      const label = AKTOR_LABEL_REKO[k] || k;
      return `<span class="pihak-chip" style="color:${colInfo.color};background:${colInfo.bg};border-color:${colInfo.color}40">${label}</span>`;

function detectCondition(text, theme) {
  if (!text) return null;
  const lower = text.toLowerCase();
  if (theme.kw) {
    return theme.kw.some(k => lower.includes(k)) ? 'detected' : null;
  }
  const isNeg = (theme.neg||[]).some(k => lower.includes(k));
  const isPos = (theme.pos||[]).some(k => lower.includes(k));
  if (isNeg) return 'neg';
  if (isPos) return 'pos';
  return null;
}

function ladderLabel(score) {
  if (score === null || score === undefined) return { label:'Tidak ada data', color:'var(--mut)' };
  if (score <= 3) return { label:'Sangat Rendah', color:'var(--red)' };
  if (score <= 5) return { label:'Rendah', color:'var(--amb)' };
  if (score <= 7) return { label:'Sedang', color:'#4f8ef7' };
  if (score <= 8) return { label:'Baik', color:'var(--grn)' };
  return { label:'Sangat Baik', color:'var(--grn)' };
}

// ═══════════════════════════════════════════════════════════
// ANALISIS UTAMA: hasilkan 3 masalah + rekomendasi tindak lanjut per anak
// ═══════════════════════════════════════════════════════════
function runAnalysis() {
  ANALISIS = [];

  const awalByName = {};
  DATA_AWAL.forEach(r => { awalByName[r.na.toLowerCase().trim()] = r; });
  const obsByName = {};
  DATA_OBS.forEach(r => {
    const key = r.na.toLowerCase().trim();
    if (!obsByName[key]) obsByName[key] = r;
  });

  const allNames = new Set();
  SEMUA_ANAK.forEach(a => allNames.add(a.na));
  DATA_AWAL.forEach(a => allNames.add(a.na));

  allNames.forEach(nama => {
    const key = nama.toLowerCase().trim();
    const awal = awalByName[key];
    const obs = obsByName[key];
    const masterEntry = SEMUA_ANAK.find(a => a.na.toLowerCase().trim() === key);
    const cb = (awal && awal.cb) || (obs && obs.cb) || (masterEntry && masterEntry.cb) || '—';

    if (!awal && !obs) return;

    // ── Kumpulkan sinyal: setiap sinyal = {priority, masalah, rencana, pihak (boleh null)} ──
    const sinyal = [];

    // 1. Skor tangga pengasuh rendah
    if (awal && awal.sp !== null && awal.sp <= 5) {
      const lbl = ladderLabel(awal.sp);
      sinyal.push({
        priority: 100 - awal.sp,
        masalah: `Kualitas hidup pengasuh tergolong ${lbl.label.toLowerCase()} (skor ${awal.sp}/10)${awal.tkp ? ', karena: ' + awal.tkp : ''}.`,
        rencana: 'Diskusikan bersama pengasuh apa yang paling bisa membantu meringankan beban saat ini, dan susun langkah kecil yang realistis untuk 3 bulan ke depan.',
        pihak: TEMA_PIHAK_MAP['skor_pengasuh_rendah'],
      });
    }

    // 2. Skor tangga anak rendah
    if (awal && awal.sa !== null && awal.sa <= 5) {
      const lbl = ladderLabel(awal.sa);
      sinyal.push({
        priority: 99 - awal.sa,
        masalah: `Kualitas hidup anak tergolong ${lbl.label.toLowerCase()} (skor ${awal.sa}/10)${awal.tka ? ', karena: ' + awal.tka : ''}.`,
        rencana: 'Bicarakan bersama anak dan keluarga tentang hal yang membuat hidupnya membaik, lalu jadikan itu fokus utama pendampingan 3 bulan ke depan.',
        pihak: TEMA_PIHAK_MAP['skor_anak_rendah'],
      });
    }

    // 3. Epilepsi/kejang dari Data Awal
    if (awal && awal.ep === 'Ya') {
      sinyal.push({
        priority: 85,
        masalah: 'Anak memiliki riwayat epilepsi/kejang.',
        rencana: 'Pastikan ketersediaan obat rutin tidak putus, dan jadwalkan kontrol ke layanan kesehatan jika belum dilakukan dalam 3 bulan terakhir.',
        pihak: TEMA_PIHAK_MAP['epilepsi'],
      });
    }

    // 4. Analisis domain ICF dari Observasi
    const domainHasil = { struktur:[], kegiatan:[], personal:[], lingkungan:[] };
    if (obs) {
      Object.keys(THEMES_ICF).forEach(domain => {
        const fieldMap = { struktur:'st', kegiatan:'kg', personal:'pf', lingkungan:'lg' };
        const text = obs[fieldMap[domain]] || '';
        THEMES_ICF[domain].forEach(theme => {
          const cond = detectCondition(text, theme);
          if (cond) {
            domainHasil[domain].push({ label: theme.label, cond });
            if (cond === 'neg' || cond === 'detected') {
              const condLabel = domain === 'lingkungan' ? 'menjadi hambatan bagi anak'
                : domain === 'kegiatan' ? 'masih terbatas'
                : domain === 'struktur' ? 'mengalami gangguan'
                : 'menjadi perhatian';
              sinyal.push({
                priority: domain === 'lingkungan' ? 70 : domain === 'struktur' ? 75 : 65,
                masalah: `${theme.label} ${condLabel}, berdasarkan hasil observasi lapangan.`,
                rencana: theme.rencana || theme.aksi || 'Diskusikan langkah penanganan bersama keluarga.',
                pihak: theme.pihak && theme.pihak.length ? theme.pihak : null,
              });
            }
          }
        });
      });
    }

    // Urutkan berdasarkan priority, ambil 3 teratas
    sinyal.sort((a, b) => b.priority - a.priority);
    let top3 = sinyal.slice(0, 3);

    // Kalau kurang dari 3, isi dengan capaian positif (bukan kalimat generik berulang)
    if (top3.length < 3 && obs) {
      const positifPool = [];
      Object.keys(domainHasil).forEach(domain => {
        domainHasil[domain].forEach(d => {
          if (d.cond === 'pos') {
            positifPool.push({
              priority: 0,
              masalah: `${d.label} menunjukkan kondisi baik.`,
              rencana: 'Pertahankan kondisi ini dengan rutinitas dan dukungan yang sudah berjalan baik saat ini.',
              pihak: null,
            });
          }
        });
      });
      top3 = top3.concat(positifPool.slice(0, 3 - top3.length));
    }
    if (top3.length === 0) {
      top3.push({
        priority: 0,
        masalah: 'Belum ada cukup data untuk menyimpulkan kondisi anak secara spesifik.',
        rencana: 'Lakukan observasi lanjutan agar rencana 3 bulan dapat disusun lebih tepat.',
        pihak: null,
      });
    }
    top3 = top3.slice(0, 3);

    // ── Level prioritas keseluruhan anak ──
    const totalHambatan = sinyal.filter(s => s.priority > 0).length;
    const skorRendah = (awal && awal.sp !== null && awal.sp <= 4) || (awal && awal.sa !== null && awal.sa <= 4);
    let priorityLevel = 'rendah';
    if (totalHambatan >= 4 || skorRendah) priorityLevel = 'tinggi';
    else if (totalHambatan >= 2) priorityLevel = 'sedang';

    ANALISIS.push({ na: nama, cb, rg: (awal && awal.rg)||'', awal, obs, top3, priorityLevel, totalHambatan });
  });

  const prioOrder = { tinggi:0, sedang:1, rendah:2 };
  ANALISIS.sort((a, b) => prioOrder[a.priorityLevel] - prioOrder[b.priorityLevel] || a.na.localeCompare(b.na, 'id'));
}

function truncate(text, len) {
  if (!text) return '';
  return text.length > len ? text.slice(0, len) + '...' : text;
}

function setKpiFilter(level, el) {
  document.querySelectorAll('#kpiRow .kpi').forEach(k => k.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('filterPriority').value = level;
  filterReko();
}

function populateFilters() {
  const sel = document.getElementById('filterCBR');
  const cbrs = Array.from(new Set(ANALISIS.map(a => a.cb))).sort((a,b) => a.localeCompare(b,'id'));
  sel.innerHTML = '<option value="">Semua CBR Worker</option>' +
    cbrs.map(c => `<option value="${c}">${c}</option>`).join('');
  const ragamSel = document.getElementById('filterRagam');
  if(ragamSel) {
    const ragams = Array.from(new Set(ANALISIS.map(a => a.rg).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'id'));
    ragamSel.innerHTML = '<option value="">Semua Ragam</option>' +
      ragams.map(r => `<option value="${r}">${r}</option>`).join('');
  }
}

function filterReko() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const cbr = document.getElementById('filterCBR').value;
  const pri = document.getElementById('filterPriority').value;
  const ragam = document.getElementById('filterRagam')?.value || '';

  filteredReko = ANALISIS.filter(a => {
    const mq = !q || a.na.toLowerCase().includes(q) || a.cb.toLowerCase().includes(q);
    const mc = !cbr || a.cb === cbr;
    const mp = !pri || a.priorityLevel === pri;
    const mr = !ragam || a.rg === ragam;
    return mq && mc && mp && mr;
  });

  renderRecoList();
  document.getElementById('filterCount').textContent = filteredReko.length + ' anak';
}

  // Detail table
  else if(rekoViewMode==='detail') {
    document.getElementById('recoDetailView').innerHTML = `

          <th style="padding:8px 12px;text-align:left;color:var(--mut);font-weight:700;border-bottom:1px solid var(--bdr)">Hal Teridentifikasi</th>
        </tr></thead>
        <tbody>${filteredReko.map((a,i)=>{
          const pc=priColor[a.priorityLevel]||'var(--mut)';
          const dot=dots[a.priorityLevel]||'';
          const pl=priLabel[a.priorityLevel]||'—';
          return `<tr style="border-bottom:1px solid var(--bdr);cursor:pointer${i%2?';background:var(--sur)':''}" onclick="openDetail('${a.na.replace(/'/g,"\\'")}')">

          </tr>`;
        }).join('')}</tbody>
      </table>`;
  }

  document.getElementById('filterCount').textContent = filteredReko.length + ' anak';
}

function avatarColor(name) {
  const colors = ['#4f8ef7','#22c55e','#f59e0b','#a78bfa','#ef4444','#06b6d4','#f97316','#84cc16'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return colors[hash % colors.length];
}

function initials(name) {
  const parts = name.trim().split(/\s+/);
  return ((parts[0]||'')[0] || '') + ((parts[1]||'')[0] || '');
}

function showList() {
  document.getElementById('cbr-list-mode').style.display = '';
  document.getElementById('cbr-detail-mode').style.display = 'none';
  document.getElementById('namaPanel').classList.remove('open');
  activeAnak = null;
}

function openDetail(nama) {
  activeAnak = nama;
  document.getElementById('cbr-list-mode').style.display = 'none';
  document.getElementById('cbr-detail-mode').style.display = 'flex';
  document.getElementById('cbr-detail-mode').style.flexDirection = 'column';
  document.getElementById('namaPanel').classList.add('open');
  populateNamaPanelCBR();
  renderNamaPanel();
  renderDetailAnak(nama);
}

function populateNamaPanelCBR() {
  const sel = document.getElementById('npFilterCBR');
  if (sel.options.length > 1) return; // sudah diisi sebelumnya
  const cbrs = Array.from(new Set(ANALISIS.map(a => a.cb))).sort((a,b) => a.localeCompare(b,'id'));
  sel.innerHTML = '<option value="">Semua CBR Worker</option>' +
    cbrs.map(c => `<option value="${c}">${c}</option>`).join('');
}

function getNamaPanelData() {
  const q = (document.getElementById('npSearch').value || '').toLowerCase().trim();
  const cbr = document.getElementById('npFilterCBR').value;
  const base = filteredReko.length ? filteredReko : ANALISIS;
  return base.filter(a => {
    const mq = !q || a.na.toLowerCase().includes(q);
    const mc = !cbr || a.cb === cbr;
    return mq && mc;
  });
}

function renderNamaPanelList(data) {
  const listEl = document.getElementById('npList');
  const priColor = { tinggi:'var(--red)', sedang:'var(--amb)', rendah:'var(--grn)' };

  if (!data.length) {
    listEl.innerHTML = '<div style="padding:14px;font-size:11px;color:var(--mut);text-align:center">Tidak ada anak ditemukan</div>';
    return;
  }

  listEl.innerHTML = data.map(a => {
    const isActive = a.na === activeAnak;
    return `<div class="np-item ${isActive ? 'act' : ''}" onclick="openDetail('${a.na.replace(/'/g,"\\'")}')">
      <span class="np-pri-dot" style="background:${priColor[a.priorityLevel]}"></span>
      <span class="np-name">${a.na}</span>
    </div>`;
  }).join('');
}

function renderNamaPanel() {
  renderNamaPanelList(getNamaPanelData());
}

function filterNamaPanel() {
  renderNamaPanelList(getNamaPanelData());
}

function hasKeyword(text, keywords) {
  if (!text) return false;
  var t = String(text).toLowerCase();
  return keywords.some(function(kw) { return t.indexOf(kw.toLowerCase()) >= 0; });
}

function buildTemuan(kat, awal, obs, awalK, obsK) {
  var temuan = [];
  var rule = RULES[kat];

  // Ambil teks dari semua field relevan
  var texts = {
    ep:  awal ? (awal.ep === 'Ya' ? 'epilepsi aktif' : '') : '',
    ob:  awal ? (awal.ob === 'Tidak' ? 'tidak ada pengobatan rutin' : '') : '',
    tr:  awal ? (awal.tr === 'Tidak' ? 'belum mendapat terapi' : '') : '',
    rg:  awal ? awal.rg || '' : '',
    lv:  awal ? awal.lv || '' : '',
    sa:  awal && awal.sa !== null ? String(awal.sa) : '',
    sp:  awal && awal.sp !== null ? String(awal.sp) : '',
    nkp: awalK ? awalK.nkp || '' : (awal ? awal.nkp || '' : ''),
    tkp: awalK ? awalK.tkp || '' : (awal ? awal.tkp || '' : ''),
    nka: awalK ? awalK.nka || '' : (awal ? awal.nka || '' : ''),
    tka: awalK ? awalK.tka || '' : (awal ? awal.tka || '' : ''),
    st:  obsK ? obsK.st || '' : (obs ? obs.st || '' : ''),
    kg:  obsK ? obsK.kg || '' : (obs ? obs.kg || '' : ''),
    pf:  obsK ? obsK.pf || '' : (obs ? obs.pf || '' : ''),
    lg:  obsK ? obsK.lg || '' : (obs ? obs.lg || '' : ''),
  };

  // Cek field yang selalu masuk kategori ini
  rule.fields_always.forEach(function(field) {
    var val = texts[field];
    if (val && val.length > 3) {
      temuan.push({ field: field, text: val, score: 10 });
    }
  });

  // Cek field yang masuk jika ada keyword
  rule.fields_check.forEach(function(field) {
    var val = texts[field];
    if (val && hasKeyword(val, rule.keywords)) {
      // Ekstrak kalimat yang mengandung keyword
      var kalimat = extractRelevantSentences(val, rule.keywords, 200);
      if (kalimat) temuan.push({ field: field, text: kalimat, score: 5 });
    }
  });

  // Aturan khusus
  if (kat === 'kesehatan') {
    if (awal && awal.ep === 'Ya') temuan.push({ field: 'ep', text: 'Epilepsi aktif', score: 15 });
    if (awal && awal.ob === 'Tidak') temuan.push({ field: 'ob', text: 'Tidak ada pengobatan rutin', score: 8 });
    if (awal && awal.tr === 'Tidak' && awal.lv === 'Parah (dukungan penuh)') {
      temuan.push({ field: 'tr', text: 'Belum mendapat terapi meski level parah', score: 12 });
    }
    if (awal && awal.sa !== null && awal.sa <= 4) {
      // Cek apakah alasannya kesehatan
      if (hasKeyword(texts.tka, rule.keywords)) {
        temuan.push({ field: 'sa', text: 'Kualitas hidup anak sangat rendah (skor ' + awal.sa + '/10) karena hambatan kesehatan', score: 10 });
      }
    }
    if (awal && awal.sp !== null && awal.sp <= 4) {
      if (hasKeyword(texts.tkp, rule.keywords)) {
        temuan.push({ field: 'sp', text: 'Kualitas hidup pengasuh sangat rendah (skor ' + awal.sp + '/10) karena hambatan kesehatan', score: 10 });
      }
    }
  }

  if (kat === 'penghidupan') {
    if (awal && awal.sp !== null && awal.sp <= 4 && hasKeyword(texts.tkp, rule.keywords)) {
      temuan.push({ field: 'sp', text: 'Kualitas hidup pengasuh rendah (skor ' + awal.sp + '/10) akibat tekanan ekonomi', score: 10 });
    }
  }

  if (kat === 'pendidikan') {
    if (awal && awal.sa !== null && awal.sa <= 5 && hasKeyword(texts.tka, rule.keywords)) {
      temuan.push({ field: 'sa', text: 'Kualitas hidup anak rendah (skor ' + awal.sa + '/10) berkaitan dengan hambatan pendidikan', score: 8 });
    }
  }

  // Dedup berdasarkan field
  var seen = {};
  temuan = temuan.filter(function(t) {
    if (seen[t.field]) return false;
    seen[t.field] = true;
    return true;
  });

  return temuan;
}

function extractRelevantSentences(text, keywords, maxLen) {
  if (!text) return '';
  var t = String(text);
  // Split per kalimat
  var sentences = t.split(/[.;\n]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 10; });
  var relevant = sentences.filter(function(s) { return hasKeyword(s, keywords); });
  if (!relevant.length) relevant = sentences;
  var result = relevant.slice(0, 3).join('; ');
  return result.length > maxLen ? result.substring(0, maxLen) + '...' : result;
}

function buildPihak(kat, temuan, awal, obs) {
  var basePihak = RULES[kat].pihak.slice();
  var texts = temuan.map(function(t) { return t.text.toLowerCase(); }).join(' ');
  var allTexts = (texts + ' ' +
    (awal ? (awal.tka||'') + ' ' + (awal.tkp||'') + ' ' + (awal.nka||'') + ' ' + (awal.nkp||'') : '') + ' ' +

  if (kat === 'kesehatan') {
    basePihak.push('bidan_desa','kader_posyandu','ibu','ayah');
    if (hasKeyword(allTexts,['epilepsi','kejang','obat kejang'])) basePihak.push('dokter_puskesmas','perawat_puskesmas','dinkes');
    if (hasKeyword(allTexts,['terapi','fisioterapi','rehabilitasi'])) basePihak.push('fisioterapis','cbm_global','ayo_indonesia');
    if (hasKeyword(allTexts,['kursi roda','alat bantu','standing table','kacamata','alat dengar'])) basePihak.push('dinsos','uptd_sosial','cbm_global','ayo_indonesia');
    if (hasKeyword(allTexts,['gizi','nutrisi','susu','berat badan'])) basePihak.push('kader_posyandu','bidan_desa','pkk_desa');
    if (hasKeyword(allTexts,['bpjs','jkn','kartu'])) basePihak.push('kepala_desa','kasi_kesra','dinkes');
    if (awal && awal.lv === 'Parah (dukungan penuh)') basePihak.push('pastor','tua_golo');
  }

  if (kat === 'pendidikan') {
    basePihak.push('ibu','ayah','guru_agama');
    if (hasKeyword(allTexts,['belum sekolah','tidak sekolah','putus sekolah','belum masuk'])) basePihak.push('kepala_sekolah','dindik','kasi_kesra','kepala_desa');
    if (hasKeyword(allTexts,['slb','sdlb','smplb','smalb','sekolah luar biasa'])) basePihak.push('dindik','kepala_sekolah','gpk');
    if (hasKeyword(allTexts,['paud','tk','taman kanak'])) basePihak.push('guru_paud','pengelola_paud','kader_posyandu');
    if (hasKeyword(allTexts,['gpk','guru pendamping','pendampingan khusus'])) basePihak.push('gpk','kepala_sekolah','dindik');
    if (hasKeyword(allTexts,['pip','beasiswa','biaya sekolah'])) basePihak.push('kepala_sekolah','dindik','kepala_desa','kasi_kesra');
    if (hasKeyword(allTexts,['bahasa isyarat','bisindo','braille'])) basePihak.push('gpk','dindik','cbm_global','ayo_indonesia');
  }

  if (kat === 'penghidupan') {
    basePihak.push('ibu','ayah','bpd');
    if (hasKeyword(allTexts,['pkh','blt','bansos','bantuan sosial','sembako','dtks','pse'])) basePihak.push('pkh_officer','kepala_desa','kasi_kesra','dinsos');
    if (hasKeyword(allTexts,['rumah','dinding','lantai','bambu','semi permanen','layak huni'])) basePihak.push('dinsos','uptd_sosial','kepala_desa','karang_taruna','rt_rw');
    if (hasKeyword(allTexts,['penghasilan','panen','kebun','tani','usaha','modal','ternak'])) basePihak.push('pkk_desa','kelompok_tani','koperasi','kepala_desa');
    if (hasKeyword(allTexts,['bpjs','jkn','kartu','tidak ada bpjs'])) basePihak.push('kepala_desa','kasi_kesra','dinkes');
    if (hasKeyword(allTexts,['biaya terapi','biaya kursi roda','biaya alat'])) basePihak.push('dinsos','uptd_sosial','cbm_global','ayo_indonesia');
  }

  if (kat === 'sosial') {
    basePihak.push('ibu','ayah','tetangga','pkk_desa');
    if (hasKeyword(allTexts,['stigma','dikucilkan','bully','ejek','malu','diskriminasi'])) basePihak.push('tua_golo','tokoh_adat','pastor','rt_rw','kepala_desa');
    if (hasKeyword(allTexts,['isolasi','sendirian','tidak keluar','jarang bergaul'])) basePihak.push('tua_golo','kelompok_doa','omk','karang_taruna','teman_sebaya');
    if (hasKeyword(allTexts,['tunggal','janda','duda','merantau','ditinggal','sendirian mengurus'])) basePihak.push('tua_golo','paman_bibi','kakek_nenek_serumah','keluarga_besar_lain','rt_rw');
    if (hasKeyword(allTexts,['gereja','pastor','doa','misa'])) basePihak.push('pastor','katekis','kelompok_doa','pengurus_gereja');
    if (hasKeyword(allTexts,['adat','tua golo'])) basePihak.push('tua_golo','tokoh_adat');
    if (hasKeyword(allTexts,['teman','bermain','bergaul'])) basePihak.push('teman_sebaya','kelompok_bermain','warga_kampung');
  }

  if (kat === 'pemberdayaan') {
    basePihak.push('ibu','ayah','saudara_kandung','kader_disabilitas','scn');
    if (hasKeyword(allTexts,['toilet','cebok','mandi','makan sendiri','pakai baju','mandiri'])) basePihak.push('ibu','ayah','cbr_worker_lain','bidan_desa');
    if (hasKeyword(allTexts,['percaya diri','minder','malu','takut','kepercayaan diri'])) basePihak.push('guru_kelas','teman_sebaya','pastor','tua_golo');
    if (hasKeyword(allTexts,['ktp','akta','dtks','hak','kartu disabilitas','dokumen'])) basePihak.push('kepala_desa','kasi_kesra','p2tp2a','dinsos');
    if (hasKeyword(allTexts,['keterampilan','pelatihan','vokasi','kerja','produktif'])) basePihak.push('ayo_indonesia','cbm_global','lsm_lokal');
    if (awal && awal.lv === 'Parah (dukungan penuh)') basePihak.push('fisioterapis','cbm_global','ayo_indonesia');
  }

  basePihak.push('cbr_worker_lain','scn');
  return [...new Set(basePihak)];
}

function analyzeKategori(awal, obs) {
  var awalK = awal ? DATA_AWAL_KOMPRES[awal.na] || null : null;
  var obsK  = obs  ? DATA_OBS_KOMPRES[obs.na]   || null : null;

  var result = {};
  ['kesehatan','pendidikan','penghidupan','sosial','pemberdayaan'].forEach(function(kat) {
    var temuan = buildTemuan(kat, awal, obs, awalK, obsK);
    if (!temuan.length) return;

    // Gabung teks temuan
    var temuanText = temuan.map(function(t) { return t.text; }).join('; ');
    // Batasi panjang
    if (temuanText.length > 300) temuanText = temuanText.substring(0, 300) + '...';

    var rtl = buildRTL(kat, temuan, awal, obs);
    var pihak = buildPihak(kat, temuan, awal, obs);

    result[kat] = { temuan: temuanText, rtl: rtl, pihak: pihak };
  });

  return result;
}

function renderDetailAnak(nama) {
  const a = ANALISIS.find(x => x.na === nama);
  const el = document.getElementById('cbr-detail-content');
  if (!el || !a) return;

  const awal = a.awal;
  const obs  = a.obs;
  const initials = nama.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();

  // Analisis 5 kategori CBR Matrix
  var hasil = analyzeKategori(awal, obs);

  // Build HTML kategori
  var katConfig = {
    kesehatan:    { label: '🏥 Kesehatan',    cls: 'kat-kesehatan' },
    pendidikan:   { label: '🎓 Pendidikan',   cls: 'kat-pendidikan' },
    penghidupan:  { label: '💰 Penghidupan',  cls: 'kat-penghidupan' },
    sosial:       { label: '👥 Sosial',        cls: 'kat-sosial' },
    pemberdayaan: { label: '💪 Pemberdayaan', cls: 'kat-pemberdayaan' },
  };

  var katHtml = '';
  Object.keys(katConfig).forEach(function(kat) {
    var d = hasil[kat];
    if (!d || !d.temuan) return;
    var cfg = katConfig[kat];
    var pihakHtml = (d.pihak && d.pihak.length) ? renderPihakChips(d.pihak) : '';
    katHtml += '<div class="kat-block ' + cfg.cls + '">' +
      '<div class="kat-header">' + cfg.label + '</div>' +
      '<div class="kat-body">' +
        '<div class="kat-label">Temuan</div>' +
        '<div class="kat-temuan">' + d.temuan + '</div>' +
        '<div class="kat-label">Rekomendasi &amp; Tindak Lanjut</div>' +
        '<div class="kat-rtl">' + d.rtl + '</div>' +
        (pihakHtml ? '<div class="kat-label" style="margin-top:8px">Pihak yang perlu dilibatkan</div>' + pihakHtml : '') +
      '</div></div>';
  });

  if (!katHtml) {
    katHtml = '<div style="color:var(--mut);padding:20px;font-size:12px">Tidak ada temuan dari data yang tersedia.</div>';
  }

  el.innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">${initials}</div>
      <div class="detail-info">
        <div class="detail-nama">${nama}</div>
        <div class="detail-sub">${a.cb} &middot; CBR Worker</div>
        ${awal ? `<div class="detail-meta" style="margin-top:6px">
          ${awal.u ? `<span class="chip">Usia ${awal.u} th</span>` : ''}
          ${awal.j ? `<span class="chip">JK: ${awal.j}</span>` : ''}
          ${awal.k ? `<span class="chip">Kampung: ${awal.k}</span>` : ''}
          ${awal.d ? `<span class="chip">Desa: ${awal.d}</span>` : ''}
          ${awal.rg ? `<span class="chip">Ragam: ${awal.rg}</span>` : ''}
          ${awal.lv ? `<span class="chip">Level: ${awal.lv}</span>` : ''}
          ${awal.ep === 'Ya' ? `<span class="chip" style="color:#ef4444">Epilepsi: Ya</span>` : ''}
          ${awal.ob ? `<span class="chip">Pengobatan: ${awal.ob}</span>` : ''}
          ${awal.tr ? `<span class="chip">Terapi: ${awal.tr}</span>` : ''}
        </div>` : ''}
      </div>
      ${awal ? `<div style="text-align:right;flex-shrink:0">
        <div style="font-size:28px;font-weight:900;color:${awal.sa<=4?'var(--red)':awal.sa<=6?'#f59e0b':'#22c55e'}">${awal.sa !== null ? awal.sa : '-'}</div>
        <div style="font-size:9px;color:var(--mut);font-weight:600">SKOR ANAK</div>
        <div style="font-size:22px;font-weight:800;color:${awal.sp<=4?'var(--red)':awal.sp<=6?'#f59e0b':'#22c55e'};margin-top:4px">${awal.sp !== null ? awal.sp : '-'}</div>
        <div style="font-size:9px;color:var(--mut);font-weight:600">SKOR PENGASUH</div>
      </div>` : ''}
    </div>

    <div style="margin:14px 0 8px;font-size:10px;font-weight:800;letter-spacing:.6px;color:var(--mut);text-transform:uppercase">&#9679; Bahan Diskusi Rencana Anak &#8212; 3 Bulan ke Depan</div>

    <div id="kat-container">${katHtml}</div>
  `;
}
